name: Atualizar idade

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate Age
        id: calculate_age
        run: |
          BIRTH_DAY=21
          BIRTH_MONTH=8
          BIRTH_YEAR=2004

          CURRENT_YEAR=$(date +%Y)
          CURRENT_MONTH=$(date +%m)
          CURRENT_DAY=$(date +%d)

          AGE=$((CURRENT_YEAR - BIRTH_YEAR))

          if [ "$CURRENT_MONTH" -lt "$BIRTH_MONTH" ] || { [ "$CURRENT_MONTH" -eq "$BIRTH_MONTH" ] && [ "$CURRENT_DAY" -lt "$BIRTH_DAY" ]; }; then
            AGE=$((AGE - 1))
          fi

          echo "age=$AGE" >> $GITHUB_OUTPUT

      - name: Update README.md
        run: |
          AGE=${{ steps.calculate_age.outputs.age }}
          sed -i -E "s/(IDD)[^<]*(IDD)/\1$AGE\2/g" README.md

      - name: Commit and Push changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'chore: Atualizar idade'
          add: 'README.md'
